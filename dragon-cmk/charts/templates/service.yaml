apiVersion: v1
kind: Service
metadata:
  name: {{ include "dragon-cmk.fullname" . }}
  namespace: {{ include "dragon-cmk.namespace" . }}
  labels:
    {{- include "dragon-cmk.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "dragon-cmk.selectorLabels" . | nindent 4 }}
  ports:
    - name: rest
      port: {{ .Values.service.restPort }}
      targetPort: rest
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
