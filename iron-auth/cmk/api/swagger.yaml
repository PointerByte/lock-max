basePath: /
definitions:
  github_com_PointerByte_dragon-cmk_controller_models.Pagination:
    properties:
      pageNow:
        example: 1
        type: integer
      totalPages:
        example: 300
        type: integer
      totalRegisters:
        example: 30000
        type: integer
      totalRegistersPage:
        example: 100
        type: integer
    type: object
  models.CreateKEKRequest:
    properties:
      id_generate:
        type: string
      salt:
        type: string
    required:
    - id_generate
    type: object
  models.DeleteKEKRequest:
    properties:
      id_kek:
        type: string
      version:
        type: string
    type: object
  models.DeleteKeyRequest:
    properties:
      request:
        $ref: '#/definitions/models.KeyReferenceRequest'
    required:
    - request
    type: object
  models.KeyReferenceRequest:
    properties:
      key_id:
        type: string
      secret_cmk_key:
        type: string
      version_id:
        type: string
    type: object
  models.RESTResponse:
    properties:
      pagination:
        $ref: '#/definitions/github_com_PointerByte_dragon-cmk_controller_models.Pagination'
      results: {}
      serviceName:
        type: string
      serviceVersion:
        type: string
    type: object
  models.RotateKEKRequest:
    properties:
      id_generate:
        type: string
      salt:
        type: string
    required:
    - id_generate
    type: object
  models.ScheduleKeyDeletionRequest:
    properties:
      key_id:
        type: string
      pending_window_days:
        type: integer
      secret_cmk_key:
        type: string
      version_id:
        type: string
    type: object
  models.UpdateKeyVersionStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
info:
  contact: {}
  description: REST API for Customer Managed Keys (CMK), whose purpose is to let customers
    control key lifecycle and protect data through managed encryption keys.
  title: Dragon CMK REST API
  version: "1.0"
paths:
  /api/config/v1/:
    delete:
      consumes:
      - application/json
      description: Deletes a wrapping key reference using the JSON request body.
      parameters:
      - description: Delete data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.DeleteKEKRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Delete wrapping key reference
      tags:
      - KEK Config
  /api/config/v1/{id}:
    get:
      description: Gets a wrapping key reference by id_generate and optional version.
      parameters:
      - description: Generate UUID
        in: path
        name: id
        required: true
        type: string
      - description: Wrapping key version
        in: query
        name: version
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "204":
          description: Wrapping key not found
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Get wrapping key reference
      tags:
      - KEK Config
  /api/config/v1/create:
    post:
      consumes:
      - application/json
      description: Creates a wrapping key reference for CMK encryption.
      parameters:
      - description: Wrapping key data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateKEKRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Create wrapping key reference
      tags:
      - KEK Config
  /api/config/v1/list:
    get:
      description: Lists wrapping key versions for an id_generate.
      parameters:
      - description: Generate id
        in: query
        name: id_generate
        required: true
        type: string
      - description: Page number
        in: query
        name: page
        required: true
        type: integer
      - description: Total registers per page
        in: query
        name: totalResgisterPage
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      security:
      - BearerAuth: []
      summary: List wrapping keys
      tags:
      - KEK Config
  /api/config/v1/rotate:
    post:
      consumes:
      - application/json
      description: Rotates a wrapping key reference using the request id or creates
        a new id when omitted.
      parameters:
      - description: Rotation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RotateKEKRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Rotate wrapping key reference
      tags:
      - KEK Config
  /api/keys/v1/:
    delete:
      consumes:
      - application/json
      description: Deletes a customer managed key using the JSON request body.
      parameters:
      - description: Delete key request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.DeleteKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Delete a CMK
      tags:
      - CMK Keys
  /api/keys/v1/cancel-deletion:
    post:
      consumes:
      - application/json
      description: Cancels pending deletion for a customer managed key.
      parameters:
      - description: Key reference
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.KeyReferenceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Cancel CMK deletion
      tags:
      - CMK Keys
  /api/keys/v1/creation-queues/list:
    get:
      description: Lists records from dragon_cmk.cmk_creation_key_queue with pagination.
      parameters:
      - description: CMK key id
        in: query
        name: id_cmk_key
        type: string
      - description: Queue status
        in: query
        name: status
        type: string
      - description: Page number
        in: query
        name: page
        required: true
        type: integer
      - description: Total registers per page
        in: query
        name: totalResgisterPage
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      security:
      - BearerAuth: []
      summary: List CMK creation key queues
      tags:
      - CMK Keys
  /api/keys/v1/disable:
    post:
      consumes:
      - application/json
      description: Disables a customer managed key by secret_cmk_key or key_id/version_id.
      parameters:
      - description: Key reference
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.KeyReferenceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Disable a CMK
      tags:
      - CMK Keys
  /api/keys/v1/enable:
    post:
      consumes:
      - application/json
      description: Enables a customer managed key by secret_cmk_key or key_id/version_id.
      parameters:
      - description: Key reference
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.KeyReferenceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Enable a CMK
      tags:
      - CMK Keys
  /api/keys/v1/list:
    get:
      description: Lists CMK keys that belong to a KEK id.
      parameters:
      - description: KEK id
        in: query
        name: id_kek
        required: true
        type: string
      - description: Page number
        in: query
        name: page
        required: true
        type: integer
      - description: Total registers per page
        in: query
        name: totalResgisterPage
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      security:
      - BearerAuth: []
      summary: List CMK keys
      tags:
      - CMK Keys
  /api/keys/v1/pending-deletion:
    post:
      consumes:
      - application/json
      description: Moves a customer managed key into pending deletion by secret_cmk_key
        or key_id/version_id.
      parameters:
      - description: Key reference
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.KeyReferenceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Mark CMK as pending deletion
      tags:
      - CMK Keys
  /api/keys/v1/schedule-deletion:
    post:
      consumes:
      - application/json
      description: Marks a customer managed key for deletion after the pending window.
      parameters:
      - description: Deletion schedule
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ScheduleKeyDeletionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Schedule CMK deletion
      tags:
      - CMK Keys
  /api/keys/v1/unavailable:
    post:
      consumes:
      - application/json
      description: Moves a customer managed key into unavailable state by secret_cmk_key
        or key_id/version_id.
      parameters:
      - description: Key reference
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.KeyReferenceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      summary: Mark CMK unavailable
      tags:
      - CMK Keys
  /api/keys/v1/versions/{version_id}:
    get:
      description: Gets secret_cmk_key and non-sensitive version data by version id.
      parameters:
      - description: CMK key version id
        in: path
        name: version_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      security:
      - BearerAuth: []
      summary: Get CMK key version
      tags:
      - CMK Keys
  /api/keys/v1/versions/{version_id}/status:
    patch:
      consumes:
      - application/json
      description: Updates a specific non-current key version status. pendingDeletion
        is not accepted.
      parameters:
      - description: CMK key version id
        in: path
        name: version_id
        required: true
        type: string
      - description: Status update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateKeyVersionStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.RESTResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.RESTResponse'
      security:
      - BearerAuth: []
      summary: Update CMK key version status
      tags:
      - CMK Keys
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Use a Bearer token in the format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
